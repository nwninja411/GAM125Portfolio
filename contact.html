
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
    if (sessionStorage.getItem("filmTransition") === "1") {
        document.documentElement.classList.add("is-transitioning");
    }
    </script>
    <title>Contact</title>
    <link rel="stylesheet" href="stylesheet.css">
    <link rel="stylesheet" href="contact.css">
    <link rel="icon" type="png" href="SKPFav.png">
</head>

<body>
    <!-- Create the elements for the Navigation bar -->
    <nav>
            <img src="Logo.png" alt="Silent Kid Productions Logo" class="Logo">
            <div id="NavLinks">
            <a href="index.html" class="Button">Home</a>
            <a href="objectives.html" class="Button">Objectives</a>
            <a href="gallery.html" class="Button">Gallery</a>
            <a href="contact.html" class="Button">Contact</a>
            </div>
            <div id="Hamburger">☰</div>
        </nav>

    <!-- Create the header for the Contact page -->
    <header class="PageHeader">
    <div class="HeaderInner">
        <h1>Contact</h1>
    </div>
    </header>

    <main>
        <section id="Contact">

            <div id="Title">
                <h1>Contact Me</h1>

                <h2>
                    Have questions or want to discuss a project? I'm here to help! 
                    Fill out the contact form and I will get back to you as soon as possible.
                </h2>

                <a class="ContactLinkedIn" href="https://www.linkedin.com/in/noah-walker-1b229a306/" target="_blank" rel="noopener">
                    <img src="LI-Logo.png" alt="LinkedIn">
                </a>
            </div>

            <!-- Create a div for the actual form in the contact section. This allows for grid to be used -->
            <div id="Form">
                <form action="https://formspree.io/f/mwvnggkz" method="POST">

                    <input type="hidden" name="_subject" value="New message from portfolio website">

                    <label for="name">Name</label>
                    <input type="text" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" name="email" required>

                    <label for="message">Message</label>
                    <textarea name="message" required></textarea>

                    <button type="submit">Submit</button>

                </form>
            </div>
        </section>
    </main>

    <!-- Link the JavaScirpt File -->
    <script src="script.js"></script>

</body>

</html>
